name: Portfolio Monitor

on:
  schedule:
    - cron: '10,30,50 * * * *'   # Runs every 20 minutes for alert checking
    - cron: '0 0,4,8,12,16,20 * * *' # Runs every 4 hours for periodic report
  workflow_dispatch:        # Allows manual run button

jobs:
  check-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests ccxt
          
      - name: Run Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.PORTFOLIO_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.PORTFOLIO_CHAT_ID }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
          GATE_API_KEY: ${{ secrets.GATE_API_KEY }}
          GATE_SECRET: ${{ secrets.GATE_SECRET }}
          HYPERLIQUID_WALLET: ${{ secrets.HYPERLIQUID_WALLET }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          # If manually triggered or triggered by the 4-hour report cron, pass the --report flag
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event.schedule }}" == "0 0,4,8,12,16,20 * * *" ]; then
            python -u portfolio_bot/cloud_portfolio.py --report
          else
            python -u portfolio_bot/cloud_portfolio.py
          fi
